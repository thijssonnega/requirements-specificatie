<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe 1 – Login scherm</title>
</head>
<body style="margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #f5f5f5;">
    <h1>Wireframe 1 – Login scherm</h1>
    <div style="background: #e8e8e8; padding: 40px 20px; border-radius: 0; margin: 20px 0;">
        <div style="max-width: 380px; margin: 0 auto; background: white; border-radius: 0; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15); padding: 50px 35px; border: 1px solid #ddd;">
            <div style="text-align: center; margin-bottom: 35px;">
                <h2 style="font-size: 20px; color: #333; margin: 0 0 6px 0; font-weight: 700; letter-spacing: 0.5px;">DE CACAODROOM</h2>
                <p style="font-size: 10px; color: #999; margin: 0; letter-spacing: 2px; font-weight: 600;">BI PORTAL</p>
            </div>
            <form>
                <div style="margin-bottom: 18px;">
                    <label style="display: block; font-size: 12px; color: #555; margin-bottom: 6px; font-weight: 500;">Gebruikersnaam</label>
                    <input type="text" placeholder=" " style="width: 100%; padding: 10px 12px; border: 1px solid #bbb; border-radius: 0; font-size: 13px; font-family: Arial, sans-serif; background: #fefefe; box-sizing: border-box; color: #333;">
                </div>
                <div style="margin-bottom: 18px;">
                    <label style="display: block; font-size: 12px; color: #555; margin-bottom: 6px; font-weight: 500;">Wachtwoord</label>
                    <input type="password" placeholder=" " style="width: 100%; padding: 10px 12px; border: 1px solid #bbb; border-radius: 0; font-size: 13px; font-family: Arial, sans-serif; background: #fefefe; box-sizing: border-box; color: #333;">
                </div>
                <button type="submit" style="width: 100%; padding: 10px 15px; background: #888; color: white; border: 1px solid #666; border-radius: 0; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 14px; font-family: Arial, sans-serif;">Inloggen</button>
            </form>
            <div style="text-align: center;">
                <a href="#" style="color: #666; text-decoration: none; font-size: 12px; font-family: Arial, sans-serif;">Wachtwoord vergeten?</a>
            </div>
        </div>
    </div>
</body>
</html>
