<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg-outer { fill: #f5f5f5; }
      .header-bar { fill: #ccc; }
      .chart-area { fill: #f0f0f0; stroke: #ddd; stroke-width: 1; }
      .table-header { fill: #e8e8e8; stroke: #ddd; stroke-width: 1; }
      .table-row { fill: white; stroke: #eee; stroke-width: 1; }
      .section-box { fill: #f9f9f9; stroke: #ddd; stroke-width: 1; }
      .text-label { fill: #333; font-size: 11px; font-weight: 600; }
      .text-value { fill: #666; font-size: 10px; }
      .text-header { fill: #333; font-size: 12px; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg-outer" width="700" height="450"/>
  
  <!-- Header -->
  <rect class="header-bar" x="0" y="0" width="700" height="30"/>
  <text class="text-header" x="20" y="20">De Cacaodroom BI [COO]</text>
  <text class="text-header" x="680" y="20" text-anchor="end">[Logout]</text>
  
  <!-- Left Column: Verspilling Chart -->
  <text class="text-label" x="20" y="50">VERSPILLING PER BATCH</text>
  <rect class="chart-area" x="20" y="60" width="320" height="100"/>
  <text style="fill: #999; font-size: 10px;" x="180" y="115" text-anchor="middle">[Chart]</text>
  
  <!-- Batch List -->
  <text class="text-label" x="20" y="175">BATCH DATA</text>
  <rect class="table-header" x="20" y="185" width="320" height="20"/>
  <text class="text-value" x="30" y="200">Batch ID</text>
  <text class="text-value" x="100" y="200">Datum</text>
  <text class="text-value" x="200" y="200">Verspilling %</text>
  
  <rect class="table-row" x="20" y="205" width="320" height="18"/>
  <text class="text-value" x="30" y="218">B-2024-001</text>
  <text class="text-value" x="100" y="218">2024-01-15</text>
  <text class="text-value" x="200" y="218">2.1%</text>
  
  <rect class="table-row" x="20" y="223" width="320" height="18"/>
  <text class="text-value" x="30" y="236">B-2024-002</text>
  <text class="text-value" x="100" y="236">2024-01-16</text>
  <text class="text-value" x="200" y="236">1.8%</text>
  
  <rect class="table-row" x="20" y="241" width="320" height="18"/>
  <text class="text-value" x="30" y="254">B-2024-003</text>
  <text class="text-value" x="100" y="254">2024-01-17</text>
  <text class="text-value" x="200" y="254">3.2%</text>
  
  <!-- Right Column: Alerts & Stock -->
  <text class="text-label" x="360" y="50">VOORRAAD ALERTS</text>
  <rect class="section-box" x="360" y="60" width="320" height="80"/>
  <text style="fill: #d32f2f; font-size: 10px; font-weight: 600;" x="370" y="80">⚠ Pure Couverture: 5% kritiek</text>
  <text style="fill: #f57c00; font-size: 10px; font-weight: 600;" x="370" y="100">⚠ Melkpoeder: 15% waarschuwing</text>
  <text style="fill: #388e3c; font-size: 10px; font-weight: 600;" x="370" y="120">✓ Verpakking: 42% OK</text>
  
  <!-- Voorraadinzicht Table -->
  <text class="text-label" x="360" y="160">VOORRAADINZICHT</text>
  <rect class="table-header" x="360" y="170" width="320" height="20"/>
  <text class="text-value" x="370" y="185">Product</text>
  <text class="text-value" x="480" y="185">Actueel</text>
  <text class="text-value" x="580" y="185">Minimum</text>
  
  <rect class="table-row" x="360" y="190" width="320" height="18"/>
  <text class="text-value" x="370" y="203">Pure Couverture</text>
  <text class="text-value" x="480" y="203">250 kg</text>
  <text class="text-value" x="580" y="203">500 kg</text>
  
  <rect class="table-row" x="360" y="208" width="320" height="18"/>
  <text class="text-value" x="370" y="221">Melkpoeder</text>
  <text class="text-value" x="480" y="221">180 kg</text>
  <text class="text-value" x="580" y="221">250 kg</text>
  
  <rect class="table-row" x="360" y="226" width="320" height="18"/>
  <text class="text-value" x="370" y="239">Karamelzaad</text>
  <text class="text-value" x="480" y="239">420 kg</text>
  <text class="text-value" x="580" y="239">300 kg</text>
  
  <!-- Leveranciers Performance -->
  <text class="text-label" x="360" y="265">LEVERANCIERS PERFORMANCE</text>
  <rect class="section-box" x="360" y="275" width="320" height="150"/>
  <text class="text-value" x="370" y="295">Ragunan Chocolate (ID):</text>
  <text class="text-value" x="375" y="310">Levertijd: 14 dgn | Score: 4.2/5</text>
  
  <text class="text-value" x="370" y="340">CocoaBeans Ltd (Ghana):</text>
  <text class="text-value" x="375" y="355">Levertijd: 21 dgn | Score: 4.8/5</text>
  
  <text class="text-value" x="370" y="385">Packaging Solutions (NL):</text>
  <text class="text-value" x="375" y="400">Levertijd: 7 dgn | Score: 4.5/5</text>
</svg>
