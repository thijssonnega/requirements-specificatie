<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg-outer { fill: #f5f5f5; }
      .header-bar { fill: #ccc; }
      .button { fill: #efefef; stroke: #ccc; stroke-width: 1; }
      .chart-area { fill: #f0f0f0; stroke: #ddd; stroke-width: 1; }
      .info-box { fill: #f9f9f9; stroke: #ddd; stroke-width: 1; }
      .text-label { fill: #333; font-size: 11px; font-weight: 500; }
      .text-value { fill: #666; font-size: 11px; }
      .text-header { fill: #333; font-size: 12px; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg-outer" width="600" height="400"/>
  
  <!-- Header -->
  <rect class="header-bar" x="0" y="0" width="600" height="30"/>
  <text class="text-header" x="20" y="20">De Cacaodroom BI [CFO]</text>
  <text class="text-header" x="580" y="20" text-anchor="end">[Logout]</text>
  
  <!-- Filter Buttons -->
  <rect class="button" x="20" y="40" width="80" height="25" rx="2"/>
  <text class="text-label" x="60" y="57" text-anchor="middle">Periode</text>
  
  <rect class="button" x="110" y="40" width="80" height="25" rx="2"/>
  <text class="text-label" x="150" y="57" text-anchor="middle">Productlijn</text>
  
  <rect class="button" x="200" y="40" width="100" height="25" rx="2"/>
  <text class="text-label" x="250" y="57" text-anchor="middle">Klantsegment</text>
  
  <!-- Left Column: Marge -->
  <text class="text-label" x="20" y="85">MARGE PER PRODUCTLIJN</text>
  <rect class="chart-area" x="20" y="95" width="270" height="70"/>
  <text style="fill: #999; font-size: 10px;" x="155" y="132" text-anchor="middle">[Chart]</text>
  
  <text class="text-value" x="20" y="180">Pure: 24%</text>
  <text class="text-value" x="20" y="195">Melk: 19%</text>
  <text class="text-value" x="20" y="210">Karamel: 28%</text>
  
  <text class="text-label" x="20" y="240">MARGE PER KLANTSEGMENT</text>
  <text class="text-value" x="20" y="260">Supermarkt: 22%</text>
  <text class="text-value" x="20" y="275">Groothandel: 18%</text>
  <text class="text-value" x="20" y="290">Speciaalzaak: 31%</text>
  
  <!-- Right Column: Cashflow -->
  <text class="text-label" x="310" y="85">CASHFLOW</text>
  <rect class="chart-area" x="310" y="95" width="270" height="70"/>
  <text style="fill: #999; font-size: 10px;" x="445" y="132" text-anchor="middle">[Chart]</text>
  
  <!-- Facturen Info -->
  <rect class="info-box" x="310" y="180" width="270" height="70"/>
  <text class="text-label" x="320" y="195">OPENSTAANDE FACTUREN</text>
  <text class="text-value" x="320" y="215">Totaal: €24.300</text>
  <text class="text-value" x="320" y="230">> 30 dagen: 3</text>
  <text class="text-value" x="320" y="245">Gem. termijn: 22 dgn</text>
  
  <!-- Export Button -->
  <rect style="fill: #999;" x="310" y="260" width="270" height="30" rx="2"/>
  <text style="fill: white; font-size: 11px; font-weight: 600;" x="445" y="281" text-anchor="middle">Export</text>
</svg>
