<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">De Cacaodroom logo</title>
  <desc id="desc">Vierkante logo-versie in warme chocoladekleuren</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8efe6"/>
      <stop offset="100%" stop-color="#efe1d4"/>
    </linearGradient>
    <linearGradient id="choco" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f1209"/>
      <stop offset="55%" stop-color="#5a2518"/>
      <stop offset="100%" stop-color="#7a3524"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1d9a4"/>
      <stop offset="100%" stop-color="#cfa154"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feMerge>
        <feMergeNode in="o"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="64" fill="url(#bg)"/>

  <g transform="translate(32 24)">
    <ellipse cx="224" cy="232" rx="170" ry="204" fill="url(#choco)"/>
    <ellipse cx="224" cy="232" rx="154" ry="188" fill="none" stroke="#3b170d" stroke-width="12"/>

    <path d="M224 44c-42 62-58 128-62 190-3 64 6 130 26 197" fill="none" stroke="#8a4738" stroke-width="22" stroke-linecap="round"/>
    <path d="M264 46c-20 62-26 126-22 188 4 64 19 129 48 194" fill="none" stroke="#9f5544" stroke-width="20" stroke-linecap="round"/>

    <path d="M28 240c0-34 27-61 61-61h272c34 0 61 27 61 61s-27 61-61 61H89c-34 0-61-27-61-61z" fill="url(#choco)" filter="url(#soft)"/>

    <path d="M242 194c30-26 69-22 91 6 17-15 44-14 59 3 20 23 13 57-14 72-29 17-62 4-82-18-26 19-64 20-91-2-20-16-22-45-3-61 11-9 26-10 40 0z" fill="#e9d1a9" opacity="0.9"/>

    <text x="132" y="240" fill="url(#gold)" font-family="Georgia, serif" font-size="72" font-weight="700">De</text>
    <text x="68" y="302" fill="url(#gold)" font-family="Georgia, serif" font-size="86" font-weight="700">Cacaodroom</text>
  </g>
</svg>
